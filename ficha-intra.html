<!DOCTYPE html>

<html lang="pt-BR">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1a;color:#e8edf5;overflow:hidden;width:100%;height:100%}
#app{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#141e33;border-bottom:1px solid #2a3f6b;height:42px;flex-shrink:0}
.logo{font-weight:800;font-size:14px;color:#00ccff;display:flex;align-items:center;gap:6px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-time{font-weight:700;color:#00ccff;font-size:14px}
.hdr-btn{padding:4px 8px;border-radius:5px;border:1px solid #2a3f6b;background:#1c2a48;color:#e8edf5;font-size:11px;cursor:pointer}
.api-badge{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;font-size:10px;font-weight:600}
.api-badge .dot{width:6px;height:6px;border-radius:50%;background:#ff4466}
.api-badge.online .dot{background:#00e68a}
.api-badge span{color:#6080aa}
.patient-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(0,204,255,.05);border-bottom:1px solid #2a3f6b;min-height:36px;flex-shrink:0}
.patient-name{font-size:12px;font-weight:700;color:#fff;flex:1;cursor:pointer}
.patient-info{font-size:10px;color:#6080aa}
.patient-btn{padding:4px 10px;border-radius:5px;border:1px solid rgba(0,204,255,.3);background:rgba(0,204,255,.1);color:#00ccff;font-size:10px;font-weight:600;cursor:pointer}
.patient-btn.transfer{border-color:rgba(0,230,138,.3);background:rgba(0,230,138,.1);color:#00e68a}
.toolbar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:#141e33;border-bottom:1px solid #2a3f6b;height:32px;flex-shrink:0;overflow-x:auto}
.tb-spacer{flex:1;min-width:8px}
.tb-btn{padding:4px 12px;border-radius:5px;border:1px solid #2a3f6b;background:#1c2a48;color:#e8edf5;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.tb-btn.primary{background:rgba(0,230,138,.12);color:#00e68a;border-color:rgba(0,230,138,.3)}
.tb-btn.config{font-size:16px;padding:4px 8px}
.tb-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;cursor:pointer;white-space:nowrap}
.tb-badge.anest{color:#00ccff;border:1px solid rgba(0,204,255,.3);background:rgba(0,204,255,.08)}
.tb-badge.cir{color:#00e68a;border:1px solid rgba(0,230,138,.3);background:rgba(0,230,138,.08)}
.wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;min-height:0}
table{border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #2a3f6b;padding:0;text-align:center;vertical-align:middle;font-size:11px;font-weight:600;height:32px}
th{position:sticky;top:0;z-index:10;background:#141e33;font-size:9px;font-weight:700;color:#a0b4d8;height:26px}
.lbl{position:sticky;left:0;z-index:5;background:#10182a;text-align:left;padding:0 6px;font-size:10px;color:#a0b4d8;width:110px;min-width:110px;max-width:110px;white-space:nowrap;overflow:hidden}
.corner{position:sticky;left:0;top:0;z-index:20;background:#141e33}
th.now{color:#00ddff;background:rgba(0,204,255,.12)}
.sec td,.sec th{background:#182240;height:18px;font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#6080aa}
.sec .lbl{background:#182240}
td.dc{width:70px;min-width:70px;max-width:70px;cursor:pointer;background:#0f1726}
td.dc.future{opacity:.25;pointer-events:none}
.c-ecg{color:#22ddff}.c-spo2{color:#00ff99;font-weight:800}.c-capno{color:#ffdd44}.c-resp{color:#cc88ff;font-size:9px}
.c-bis{color:#ff9900;font-weight:800}.c-tof{color:#ff66aa}.c-pam{color:#ff8844}.c-pvc{color:#44ddaa}
.c-dc{color:#ff77cc}.c-ic{color:#77ddff}.c-vvs{color:#ddaa44}
.c-o2{color:#55aaff}.c-sevo{color:#ffdd44}.c-pas{color:#44ccff}.c-pad{color:#3399ee}.c-fc{color:#ff6688}
.c-evt{background:rgba(0,230,255,.3);color:#00ffff;font-weight:800;font-size:10px}
.c-ph{background:rgba(200,140,255,.3);color:#dd99ff;font-weight:800;font-size:10px}
.c-pump{background:rgba(255,140,50,.3);color:#ffaa44;font-weight:800;font-size:9px}
.c-obs{background:rgba(255,160,70,.3);color:#ffbb66;font-weight:800;font-size:10px}
.c-gains{color:#00ff99;font-size:8px;font-weight:700}.c-losses{color:#ff5566}
.graph-row .lbl{font-size:9px;font-weight:800;text-align:right;padding-right:6px}
svg.gsv{position:absolute;top:0;left:0;pointer-events:none;z-index:10}
.mbg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:#1c2a48;border-radius:16px;width:calc(100% - 20px);max-width:420px;max-height:80vh;overflow-y:auto;padding:16px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mtitle{font-size:15px;font-weight:800}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid #2a3f6b;background:#141e33;color:#a0b4d8;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.mlabel{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#6080aa;margin:10px 0 4px}
.numdisp{text-align:center;font-size:36px;font-weight:800;color:#00ddff;padding:12px;background:#0f1726;border-radius:8px;border:1px solid #2a3f6b;min-height:60px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.nbtn{height:48px;border-radius:8px;border:1px solid #2a3f6b;background:#141e33;color:#e8edf5;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
.nbtn.del{background:rgba(255,68,102,.15);color:#ff5566;font-size:14px}
.opts{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.opt{padding:12px;border-radius:8px;border:1px solid #2a3f6b;background:#141e33;color:#e8edf5;font-size:13px;cursor:pointer}
.opt.sel{background:rgba(0,204,255,.2);border-color:#00ccff;color:#00ddff}
.mbtns{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:12px;border-radius:8px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.mbtn-s{background:#00ccff;color:#0a0f1a}
.mbtn-c{background:#141e33;color:#a0b4d8;border:1px solid #2a3f6b}
.mbtn-d{background:rgba(255,68,102,.15);color:#ff4466;border:1px solid rgba(255,68,102,.3)}
.kbd{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.kbtn{width:calc(10% - 4px);min-width:28px;height:36px;border-radius:6px;border:1px solid #2a3f6b;background:#141e33;color:#e8edf5;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.kbtn.wide{width:calc(15% - 4px);min-width:42px;font-size:10px;font-weight:700}
.kbtn.del{background:rgba(255,68,102,.15);color:#ff5566}
.kbtn:active{background:rgba(0,204,255,.2)}
.cfg-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#0b1120;border:1px solid #2a3f6b;border-radius:8px;margin-bottom:6px}
.cfg-name{font-size:13px;font-weight:600}
.cfg-toggle{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.cfg-toggle.off{background:#2a3f6b;color:#6080aa}
.cfg-toggle.on{background:#00e68a;color:#0a0f1a}
.search-disp{padding:10px;background:#0b1120;border:1px solid #2a3f6b;border-radius:8px;margin-bottom:8px;font-size:14px;color:#00ccff;min-height:40px;display:flex;align-items:center}
.search-disp .placeholder{color:#4e6080}
.search-disp .icon{margin-right:8px;color:#4e6080}
.minput{width:100%;padding:10px;background:#0b1120;border:1px solid #2a3f6b;border-radius:8px;color:#e8edf5;font-size:13px;font-family:inherit;margin-bottom:8px}
.minput:focus{outline:none;border-color:#00ccff}
.aldrete-cat{background:#0b1120;border-radius:8px;border:1px solid #2a3f6b;padding:10px;margin-bottom:8px}
.aldrete-title{font-size:10px;font-weight:700;color:#6080aa;margin-bottom:6px;text-transform:uppercase}
.aldrete-opts{display:flex;gap:4px}
.aldrete-opt{flex:1;padding:8px 4px;background:#141e33;border:1px solid #2a3f6b;border-radius:6px;text-align:center;cursor:pointer;transition:all .2s}
.aldrete-opt.sel{background:rgba(0,230,138,.15);border-color:#00e68a}
.aldrete-val{font-size:16px;font-weight:800;color:#4e6080}
.aldrete-opt.sel .aldrete-val{color:#00e68a}
.aldrete-lab{font-size:8px;color:#6080aa;margin-top:2px}
.aldrete-total{text-align:center;padding:14px;background:linear-gradient(135deg,rgba(0,230,138,.1),rgba(0,204,255,.1));border-radius:8px;border:1px solid rgba(0,230,138,.3);margin-top:10px}
.aldrete-total-val{font-size:32px;font-weight:800;color:#00e68a}
.aldrete-total-lab{font-size:10px;color:#6080aa;margin-top:4px}
.bottom-bar{display:flex;gap:8px;padding:8px 12px;background:#141e33;border-top:1px solid #2a3f6b;flex-shrink:0}
.bottom-btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bottom-btn.secondary{background:#1c2a48;color:#a0b4d8;border:1px solid #2a3f6b}
.bottom-btn.primary{background:linear-gradient(135deg,#00ccff,#0099cc);color:#0a0f1a}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(100px);background:#1c2a48;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid #2a3f6b;opacity:0;transition:all .3s;z-index:400}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:#00e68a;color:#0a0f1a;border-color:#00e68a}
.toast.error{background:#ff4466;color:#fff;border-color:#ff4466}
.loading{display:flex;align-items:center;justify-content:center;padding:20px;color:#6080aa}
.spinner{width:20px;height:20px;border:2px solid #2a3f6b;border-top-color:#00ccff;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
<div class="logo"><span>📊</span><span>UNIANEST</span></div>
<div class="hdr-right">
<div class="api-badge" id="apiBadge"><div class="dot"></div><span id="apiText">Verificando...</span></div>
<button class="hdr-btn" onclick="voltarInicio()">🏠</button>
<div class="hdr-time" id="hdrTime">--:--</div>
</div>
</div>
<div class="patient-bar" id="patientBar">
<div class="patient-name" id="patientName" onclick="showPatientSelect()">👤 Selecionar Paciente</div>
<button class="patient-btn" onclick="showPatientSelect()">Trocar</button>
<button class="patient-btn transfer" onclick="transferirParaRPA()">➜ RPA</button>
</div>
<div class="toolbar">
<span class="tb-badge anest" id="tAnest" onclick="showAnestTime()">ANEST --:-- / --:--</span>
<span class="tb-badge cir" id="tCir" onclick="showCirTime()">CIR --:-- / --:--</span>
<div class="tb-spacer"></div>
<button class="tb-btn" onclick="rewindTime()">-5min</button>
<button class="tb-btn" onclick="advanceTime()">+5min</button>
<button class="tb-btn config" onclick="showConfig()">⚙️</button>
<button class="tb-btn primary" onclick="showEncerramento()">Fim</button>
<button class="tb-btn" onclick="showSummary()">Resumo</button>
</div>
<div class="wrap" id="wrap"></div>
<div class="bottom-bar">
<button class="bottom-btn secondary" onclick="exportarPDF()">📄 PDF</button>
<button class="bottom-btn primary" onclick="salvarFicha()">💾 Salvar</button>
</div>
</div>
<div class="mbg" id="mbg"><div class="modal" id="mc"></div></div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var CW=70,GROW=7,SCALE=[240,200,160,120,80,40,20];
var API_URL=localStorage.getItem('UNIANEST_API_URL')||'http://localhost:8000';
var STORAGE_KEY='UNIANEST_FICHA_INTRA';
var apiOnline=false,currentPacienteId=null,currentFichaId=null,currentPaciente=null;
var S={t0h:new Date().getHours(),t0m:Math.floor(new Date().getMinutes()/5)*5,cur:0,slots:13,started:false,d:[],ev:{},ph:{},pumps:{},evC:0,phC:0,anestSH:null,anestSM:null,anestEH:null,anestEM:null,cirSH:null,cirSM:null,cirEH:null,cirEM:null,enc:{tecnica:"",cirRealizada:"",aldrete:{atividade:-1,respiracao:-1,consciencia:-1,circulacao:-1,spo2:-1},aldreteTotal:-1}};
var CFG={mon:{bis:false,tof:false,dc:false,pam:false,pvc:false,ic:false,vvs:false},pumps:{propofol1:false,propofol2:false,remifentanil:false,dexmedetomidina:false,rocuronio:false,noradrenalina:false}};
var MON_DEFS=[{id:"bis",name:"BIS/Conox",lb:"BIS",un:"",cc:"c-bis"},{id:"tof",name:"TOF",lb:"TOF",un:"%",cc:"c-tof"},{id:"dc",name:"Debito Cardiaco",lb:"DC L/min",un:"L/min",cc:"c-dc"},{id:"pam",name:"PAM",lb:"PAM mmHg",un:"mmHg",cc:"c-pam"},{id:"pvc",name:"PVC",lb:"PVC cmH2O",un:"cmH2O",cc:"c-pvc"},{id:"ic",name:"Indice Cardiaco",lb:"IC",un:"L/min/m2",cc:"c-ic"},{id:"vvs",name:"VVS",lb:"VVS %",un:"%",cc:"c-vvs"}];
var PUMP_DEFS=[{id:"propofol1",name:"Propofol 1%",lb:"Prop 1%",un:"mcg/kg/min",cc:"c-pump",conc:10,isPump:true},{id:"propofol2",name:"Propofol 2%",lb:"Prop 2%",un:"mcg/kg/min",cc:"c-pump",conc:20,isPump:true},{id:"remifentanil",name:"Remifentanil",lb:"Remi",un:"mcg/kg/min",cc:"c-pump",conc:50,isPump:true},{id:"dexmedetomidina",name:"Dexmedetomidina",lb:"Dexmed",un:"mcg/kg/h",cc:"c-pump",conc:4,isPump:true},{id:"rocuronio",name:"Rocuronio",lb:"Rocu",un:"mg/kg/h",cc:"c-pump",conc:10,isPump:true},{id:"noradrenalina",name:"Noradrenalina",lb:"Nora",un:"mcg/kg/min",cc:"c-pump",conc:16,isPump:true}];
var ROWS_BASE=[{s:"INALATORIO"},{id:"o2",lb:"O2 L/min",tp:"num",un:"L/min",cc:"c-o2"},{id:"sevo",lb:"Sevo %",tp:"num",un:"%",cc:"c-sevo"},{id:"air",lb:"Ar comp",tp:"num",un:"L/min",cc:"c-o2"},{s:"VOLUME"},{id:"gains",lb:"Ganhos",tp:"list",cc:"c-gains"},{id:"losses",lb:"Perdas",tp:"num",un:"ml",cc:"c-losses"},{id:"diurese",lb:"Diurese",tp:"num",un:"ml",cc:"c-spo2"},{s:"MONITORIZACAO"},{id:"ecg",lb:"ECG",tp:"sel",opts:["SI","BAV","FA","BRE","BRD","ES","TSV"],cc:"c-ecg"},{id:"spo2",lb:"SpO2 %",tp:"num",un:"%",cc:"c-spo2"},{id:"capno",lb:"EtCO2",tp:"num",un:"mmHg",cc:"c-capno"},{id:"resp",lb:"Respiracao",tp:"sel",opts:["ES","A-MF","PSV","PCP","PCV","SIMV-VG"],cc:"c-resp"}];
var ROWS_MID=[{s:"SINAIS VITAIS"},{id:"pas",lb:"PAS mmHg",tp:"num",un:"mmHg",cc:"c-pas"},{id:"pad",lb:"PAD mmHg",tp:"num",un:"mmHg",cc:"c-pad"},{id:"fc",lb:"FC bpm",tp:"num",un:"bpm",cc:"c-fc"},{s:"GRAFICO",graph:true}];
var ROWS_END=[{s:"REGISTROS"},{id:"position",lb:"Posicao",tp:"sel",opts:["DD","DV","DLE","DLD","Sentado","Litotomia"],cc:"c-ecg"},{id:"pharma",lb:"Farmacos",tp:"pharma"},{id:"events",lb:"Eventos",tp:"event"},{id:"obs",lb:"Observacoes",tp:"text"}];
var ROWS=[];
var EVT_OPTS=["Acesso venoso periferico","Acesso venoso profundo","Acesso venoso central","Pre-oxigenacao","Intubacao orotraqueal","Intubacao nasotraqueal","Mascara laringea","Protecao ocular","Fixacao tubo","Aspiracao+extubacao","Raquianestesia","Peridural","Bloqueio de plexo","Sonda vesical","Sonda nasogastrica","Manta termica","Cateter PAI","Cateter arteria radial","Cateter Swan-Ganz","BIS instalado","TOF instalado","Encaminhado SRPA","Encaminhado UTI"];
var PH_LIST=["Propofol","Rocuronio","Cetamina","Etomidato","Midazolam","Fentanil","Alfentanil","Sufentanil","Remifentanil","Morfina","Cisatracurio","Atracurio","Succinilcolina","Lidocaina","Ropivacaina","Bupivacaina","Ondansetrona","Dexametasona","Efedrina","Adrenalina","Noradrenalina","Fenilefrina","Atropina","Neostigmine","Sugamadex","Dipirona","Cetoprofeno","Tramadol","Clonidina","Dexmedetomidina","Metoclopramida","Ranitidina","Omeprazol","Hidrocortisona","Metilprednisolona","Acido tranexamico","Heparina","Protamina"];
var TECNICAS=["Geral balanceada","Geral venosa total (TIVA)","Raquianestesia","Peridural","Raqui + Peridural","Bloqueio de plexo","Sedacao","Local + sedacao"];
var GAIN_OPTS=["RL 500ml","RL 1000ml","SF 0.9% 500ml","SF 0.9% 1000ml","SG 5% 500ml","Plasma Lyte 500ml","CHE 1U","PFC 1U","Albumina 20%","Coloide 500ml"];
var KB_ROWS=[["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["AB","z","x","c","v","b","n","m","DEL"]];
var _mid,_mslot,_mr,_nv="",_phName,_phNum,_searchVal="",_isUpper=false;

function buildRows(){ROWS=[];ROWS_BASE.forEach(function(r){ROWS.push(r);});MON_DEFS.forEach(function(m){if(CFG.mon[m.id])ROWS.push({id:m.id,lb:m.lb,tp:“num”,un:m.un,cc:m.cc});});ROWS_MID.forEach(function(r){ROWS.push(r);});var hasActivePump=PUMP_DEFS.some(function(p){return CFG.pumps[p.id];});if(hasActivePump){ROWS.push({s:“BOMBAS INFUSORAS”});PUMP_DEFS.forEach(function(p){if(CFG.pumps[p.id])ROWS.push({id:p.id,lb:p.lb,tp:“pump”,un:p.un,cc:p.cc,conc:p.conc});});}ROWS_END.forEach(function(r){ROWS.push(r);});}
function tStr(i){var m=S.t0m+i*5;var h=S.t0h+Math.floor(m/60);m=m%60;return(h<10?“0”:””)+h+”:”+(m<10?“0”:””)+m;}
function fmtT(h,m){return(h<10?“0”:””)+h+”:”+(m<10?“0”:””)+m;}
function getEvtSlotNum(slot){var n=0;for(var i=0;i<=slot;i++)if(S.ev[i]&&S.ev[i].length)n++;return n;}
function getPhSlotNum(slot){var n=0;for(var i=0;i<=slot;i++)if(S.ph[i]&&S.ph[i].length)n++;return n;}
function getObsSlotNum(slot){var n=0;for(var i=0;i<=slot;i++)if(S.d[i]&&S.d[i].obs)n++;return n;}
function showToast(msg,type){var toast=document.getElementById(‘toast’);toast.textContent=msg;toast.className=‘toast ‘+(type||’’);toast.classList.add(‘show’);setTimeout(function(){toast.classList.remove(‘show’);},3000);}
function loadConfig(){var saved=localStorage.getItem(‘UNIANEST_CFG’);if(saved){try{var c=JSON.parse(saved);if(c.mon)CFG.mon=c.mon;if(c.pumps)CFG.pumps=c.pumps;}catch(e){}}}
function saveConfig(){localStorage.setItem(‘UNIANEST_CFG’,JSON.stringify(CFG));}

function init(){loadConfig();buildRows();for(var i=0;i<S.slots;i++)S.d[i]={};checkAPI();carregarDadosLocais();render();setInterval(updateClock,1000);}

function carregarDadosLocais(){
var pacDados=localStorage.getItem(‘UNIANEST_PACIENTE_DADOS’);
if(pacDados){
try{
currentPaciente=JSON.parse(pacDados);
currentPacienteId=currentPaciente.id;
renderPatientBar();
}catch(e){}
}
}

function salvarFicha(){var eventosArray=[];for(var i in S.ev)S.ev[i].forEach(function(e){eventosArray.push(e);});var farmacosArray=[];for(var i in S.ph)S.ph[i].forEach(function(p){farmacosArray.push(p);});var dados={paciente_id:currentPacienteId,hora_inicio_anestesia:S.anestSH!==null?fmtT(S.anestSH,S.anestSM):null,hora_fim_anestesia:S.anestEH!==null?fmtT(S.anestEH,S.anestEM):null,hora_inicio_cirurgia:S.cirSH!==null?fmtT(S.cirSH,S.cirSM):null,hora_fim_cirurgia:S.cirEH!==null?fmtT(S.cirEH,S.cirEM):null,tecnica_anestesica:S.enc.tecnica,cirurgia_realizada:S.enc.cirRealizada,timeline:S.d,eventos:eventosArray,farmacos:farmacosArray,aldrete_total:S.enc.aldreteTotal>=0?S.enc.aldreteTotal:null,config:CFG};localStorage.setItem(‘UNIANEST_INTRA_PARA_RPA’,JSON.stringify({aldrete:S.enc.aldreteTotal,tecnica:S.enc.tecnica,cirurgia:S.enc.cirRealizada,horarios:{anestInicio:S.anestSH!==null?fmtT(S.anestSH,S.anestSM):null,anestFim:S.anestEH!==null?fmtT(S.anestEH,S.anestEM):null,cirInicio:S.cirSH!==null?fmtT(S.cirSH,S.cirSM):null,cirFim:S.cirEH!==null?fmtT(S.cirEH,S.cirEM):null}}));localStorage.setItem(STORAGE_KEY+’_’+currentPacienteId,JSON.stringify(dados));showToast(‘Ficha salva!’,‘success’);}

function transferirParaRPA(){if(!currentPacienteId){showToast(‘Selecione um paciente’,‘error’);return;}salvarFicha();setTimeout(function(){window.location.href=‘rpa.html’;},500);}

function exportarPDF(){var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF(‘p’,‘mm’,‘a4’);var y=15;doc.setFillColor(10,15,26);doc.rect(0,0,210,25,‘F’);doc.setTextColor(0,204,255);doc.setFontSize(16);doc.setFont(‘helvetica’,‘bold’);doc.text(‘UNIANEST - Ficha Intraoperatoria’,105,12,{align:‘center’});doc.setFontSize(10);doc.text(‘Sistema Integrado - HUGG/Unirio/Ebserh’,105,19,{align:‘center’});y=35;doc.setTextColor(0,0,0);if(currentPaciente){doc.setFontSize(11);doc.setFont(‘helvetica’,‘bold’);doc.text(‘PACIENTE’,15,y);y+=6;doc.setFont(‘helvetica’,‘normal’);doc.setFontSize(10);doc.text(‘Nome: ‘+currentPaciente.nome,15,y);y+=5;if(currentPaciente.peso){doc.text(‘Peso: ‘+currentPaciente.peso+‘kg’,15,y);y+=5;}y+=5;}doc.setFont(‘helvetica’,‘bold’);doc.text(‘HORARIOS’,15,y);y+=6;doc.setFont(‘helvetica’,‘normal’);var aS=S.anestSH!==null?fmtT(S.anestSH,S.anestSM):’-:-’;var aE=S.anestEH!==null?fmtT(S.anestEH,S.anestEM):’-:-’;doc.text(‘Anestesia: ‘+aS+’ - ‘+aE,15,y);y+=5;var cS=S.cirSH!==null?fmtT(S.cirSH,S.cirSM):’-:-’;var cE=S.cirEH!==null?fmtT(S.cirEH,S.cirEM):’-:-’;doc.text(‘Cirurgia: ‘+cS+’ - ‘+cE,15,y);y+=10;if(S.enc.tecnica){doc.setFont(‘helvetica’,‘bold’);doc.text(‘TECNICA: ‘+S.enc.tecnica,15,y);y+=8;}if(S.enc.aldreteTotal>=0){doc.setFont(‘helvetica’,‘bold’);doc.text(‘ALDRETE: ‘+S.enc.aldreteTotal+’/10’,15,y);y+=10;}var hasEv=false;for(var i in S.ev){if(S.ev[i].length){hasEv=true;break;}}if(hasEv){doc.setFont(‘helvetica’,‘bold’);doc.text(‘EVENTOS’,15,y);y+=6;doc.setFont(‘helvetica’,‘normal’);for(var i in S.ev)for(var j=0;j<S.ev[i].length;j++){doc.text(’- ‘+tStr(parseInt(i))+’ - ‘+S.ev[i][j].name,15,y);y+=5;}y+=5;}var hasPh=false;for(var i in S.ph){if(S.ph[i].length){hasPh=true;break;}}if(hasPh){doc.setFont(‘helvetica’,‘bold’);doc.text(‘FARMACOS’,15,y);y+=6;doc.setFont(‘helvetica’,‘normal’);for(var i in S.ph)for(var j=0;j<S.ph[i].length;j++){var p=S.ph[i][j];doc.text(’- ‘+tStr(parseInt(i))+’ - ‘+p.name+’ ‘+p.dose+p.unit+’ ‘+p.via,15,y);y+=5;}}var nomeArquivo=‘INTRA_’+(currentPaciente?currentPaciente.nome:‘paciente’).replace(/\s+/g,’_’).substring(0,20)+’.pdf’;var pdfBlob=doc.output(‘blob’);var pdfFile=new File([pdfBlob],nomeArquivo,{type:‘application/pdf’});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[pdfFile]}))navigator.share({files:[pdfFile],title:‘Ficha Intraoperatoria’}).then(function(){showToast(‘PDF compartilhado!’,‘success’);}).catch(function(err){if(err.name!==‘AbortError’)doc.save(nomeArquivo);});else{doc.save(nomeArquivo);showToast(‘PDF exportado!’,‘success’);}}

(function(){var wrap=document.getElementById(“wrap”);var sx=0,sy=0,st=0,sel=null;function findCell(el){while(el&&el!==wrap){if(el.tagName===“TD”&&el.classList.contains(“dc”)&&el.getAttribute(“data-r”))return el;el=el.parentElement;}return null;}wrap.addEventListener(“touchstart”,function(e){var t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();sel=findCell(e.target);},{passive:true});wrap.addEventListener(“touchend”,function(e){if(!sel)return;var t=e.changedTouches[0];if(Math.abs(t.clientX-sx)<12&&Math.abs(t.clientY-sy)<12&&Date.now()-st<500){e.preventDefault();sel.style.background=“rgba(0,204,255,.2)”;setTimeout(function(){if(sel)sel.style.background=””;},200);cellTap(sel.getAttribute(“data-r”),parseInt(sel.getAttribute(“data-i”)));}sel=null;},{passive:false});wrap.addEventListener(“click”,function(e){if(“ontouchstart”in window)return;var cell=findCell(e.target);if(cell)cellTap(cell.getAttribute(“data-r”),parseInt(cell.getAttribute(“data-i”)));});})();
