<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNIANEST</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;min-height:100vh}
#splash{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#splash.hide{display:none}
#app{display:none;padding:20px}
.logo{width:100px;height:100px;background:linear-gradient(135deg,#14b8a6,#3b82f6,#a855f7);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px}
h1{margin:0 0 8px;font-size:28px;letter-spacing:3px}
p{margin:0 0 30px;color:#888}
button{padding:16px 50px;background:linear-gradient(135deg,#14b8a6,#3b82f6);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:bold}
small{position:fixed;bottom:20px;color:#555}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:12px}
.card h3{margin:0 0 5px;color:#14b8a6}
.card p{margin:0;color:#888;font-size:14px}
</style>
</head>
<body>
<div id="splash">
<div class="logo">🏥</div>
<h1>UNIANEST</h1>
<p>Sistema Integrado de Anestesia</p>
<button id="btnEntrar">ENTRAR</button>
<small>v2.1.0</small>
</div>
<div id="app">
<h2 style="text-align:center;margin-bottom:20px">UNIANEST</h2>
<div class="card" id="cardPre">
<h3>📋 Pre-Anestesia</h3>
<p>Avaliacao pre-operatoria</p>
</div>
<div class="card" id="cardIntra">
<h3>🩺 Intraoperatorio</h3>
<p>Ficha em tempo real</p>
</div>
<div class="card" id="cardRpa">
<h3>🏥 Recuperacao (RPA)</h3>
<p>Pos-anestesica</p>
</div>
</div>
<script>
document.getElementById("btnEntrar").addEventListener("click", function() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
});

document.getElementById(“cardPre”).addEventListener(“click”, function() {
window.location.href = “pre-anestesia.html”;
});

document.getElementById(“cardIntra”).addEventListener(“click”, function() {
window.location.href = “ficha-intra.html”;
});

document.getElementById(“cardRpa”).addEventListener(“click”, function() {
window.location.href = “rpa.html”;
});
</script>

</body>
</html>
